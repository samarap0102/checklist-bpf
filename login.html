<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="variables.css">

    <script src="https://kit.fontawesome.com/c30b49532e.js" crossorigin="anonymous"></script>
</head>
 <body>
    <main class="login-container">
        <section class="login-card">
            
            <div class="login-header">
                <div class="icon-header">
                    <i class="fa-brands fa-nutritionix"></i>
                </div>

            <div class="header-text">
                <h1>Checklist de Boas Práticas de Fabricação</h1>
            <h2>Controle de conformidade e segurança alimentar</h2>
                </div>
            </div>

        <form class="login-form">
            <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email aqui">
            <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">

                <a href="inspecao.html" class="btn-entrar">Entrar</a>
        </form>
        
        </section>
    </main>
</body>
</html>
