<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção</title>
    <link rel="stylesheet" href="inspecao.css">
    <link rel="stylesheet" href="variables.css">

    <script src="https://kit.fontawesome.com/c30b49532e.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <header class="header">
<div class="title">
      <div class="title-top">
        <i class="fa-brands fa-nutritionix"></i>

        <div class="title">
    <h1>Checklist de Boas Práticas de Fabricação</h1>
    <p>Controle de conformidade e segurança alimentar</p>
</div>
    </header>

<div class="informacoes">
    <h2>Informações da Inspeção</h2>
    
    <section class="info-inspecao">
    <div class="info-container">

    <div class="info-item">
        <span class="icon-inspecao">📍</span>
        <div class="info-content">
        <label for="local">Unidade / Local</label>
        <input type="text" id="local" placeholder="Nome da unidade/local">
        </div>
    </div>

    <div class="info-item">
        <span class="icon-inspecao">📅</span>
        <div class="info-content">
        <label for="data">Data da Inspeção</label>
        <input type="date" id="data">
        </div>
    </div>

    <div class="info-item">
        <span class="icon-inspecao">👤</span>
        <div class="info-content">
        <label for="responsavel">Responsável Técnico</label>
        <input type="text" id="responsavel" placeholder="Nome do Responsável">
        </div>
    </div>
    </div>

    <div class="acoes">
        <a href="index.html" class="btn-inspecao">Iniciar Inspeção</a>
    </div>
</section>
</div>
</div>
</body>
</html>
