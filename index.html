<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checklist-bpf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        
  <div class="header-left">
    <div class="title">
      <h1>Checklist de Boas Práticas de Fabricação - BPF</h1>
      <p>Controle de conformidade e segurança alimentar</p>
    </div>
  </div>

  <div class="header-right">
    <button class="btn-login">Entrar</button>
  </div>
</header>

<div class="informacoes section">
    <h2>INFORMAÇÕES DA INSPEÇÃO</h2>
    
    <section class="info-inspecao">
    <div class="info-container">

    <div class="info-item">
        <span class="icon-inspecao">📍</span>

        <div class="info-content">
        <label for="local">Unidade / Local</label>
        <input type="text" id="local" placeholder="Nome da unidade/local">
        </div>
    </div>

    <div class="info-item">
        <span class="icon-inspecao">📅</span>

        <div class="info-content">
        <label for="data">Data da Inspeção</label>
        <input type="date" id="data">
        </div>
    </div>

    <div class="info-item">
        <span class="icon-inspecao">👤</span>

        <div class="info-content">
        <label for="responsavel">Responsável Técnico</label>
        <input type="text" id="responsavel" placeholder="Nome do Responsável">
        </div>
    </div>
</section>
</div>

</body>
</html>
